<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>Ref Navigator - Multi-Mode</title>
  <style>
    :root { --bg: #000; --ui-bg: rgba(20,20,20,0.95); --accent: #4a90e2; }
    body { margin: 0; background: var(--bg); color: #fff; font-family: system-ui, sans-serif; height: 100vh; width: 100vw; overflow: hidden; display: flex; flex-direction: row; }
    body.layout-vertical { flex-direction: column; }

    .instance { position: relative; flex: 1; border-right: 1px solid #333; overflow: hidden; display: flex; flex-direction: column; transition: none; }
    body.layout-vertical .instance { border-right: none; border-bottom: 1px solid #333; }
    .instance.hidden { display: none; }
    .instance:last-child { border-right: none; border-bottom: none; }

    .viewport { flex: 1; display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative; background: #050505; }
    .mainImage { width: 100%; height: 100%; object-fit: contain; will-change: transform; transition: opacity 0.2s; cursor: grab; display: block; }
    
    .ui-layer { position: absolute; z-index: 100; pointer-events: none; width: 100%; height: 100%; }
    .ui-layer > * { pointer-events: auto; }

    .top-bar { top: 10px; display: flex; justify-content: center; width: 100%; position: absolute; }
    .category-container { display: flex; flex-wrap: wrap; justify-content: center; gap: 4px; background: var(--ui-bg); padding: 5px; border-radius: 10px; border: 1px solid #333; max-width: 80%; }
    
    .cat-btn { width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; background: #333; border-radius: 5px; cursor: pointer; font-size: 11px; font-weight: bold; color: #888; }
    .cat-btn input { display: none; }
    .cat-btn:has(input:checked) { background: var(--accent); color: #fff; }

    .loader { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: var(--ui-bg); padding: 12px 24px; border-radius: 10px; border: 1px solid var(--accent); display: none; z-index: 1000; font-size: 12px; pointer-events: none; }

    .bottom-bar { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); display: flex; gap: 15px; align-items: center; background: var(--ui-bg); padding: 8px 20px; border-radius: 20px; border: 1px solid #333; z-index: 1000; }
    .tool-btn { background: none; border: none; color: #aaa; font-size: 18px; cursor: pointer; transition: 0.2s; }
    .tool-btn.active { color: var(--accent); }

    /* Dual mode split controls */
    #splitControls {
      display: none;
      align-items: center;
      gap: 8px;
    }
    body.dual-active #splitControls { display: flex; }

    #splitSlider {
      -webkit-appearance: none;
      appearance: none;
      width: 90px;
      height: 4px;
      background: #444;
      border-radius: 2px;
      outline: none;
      cursor: pointer;
    }
    #splitSlider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: var(--accent);
      cursor: pointer;
    }
    #splitSlider::-moz-range-thumb {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: var(--accent);
      cursor: pointer;
      border: none;
    }

    /* Divider / resizer handle */
    #divider {
      display: none;
      background: #222;
      z-index: 200;
      flex-shrink: 0;
      cursor: col-resize;
      transition: background 0.2s;
    }
    #divider:hover, #divider.dragging { background: var(--accent); }
    body.dual-active #divider { display: block; }
    body.layout-horizontal #divider { width: 5px; height: 100vh; cursor: col-resize; }
    body.layout-vertical #divider { height: 5px; width: 100vw; cursor: row-resize; }

    /* Focus toggles */
    .focus-toggle { 
        position: absolute; 
        top: 15px; 
        right: 15px; 
        background: #222; 
        color: #666; 
        width: 26px; 
        height: 26px; 
        display: none;
        align-items: center; 
        justify-content: center; 
        cursor: pointer; 
        border: 1px solid #444; 
        border-radius: 4px; 
        font-size: 14px;
    }
    body.dual-active .focus-toggle { display: flex; }
    .focus-toggle.active { color: var(--accent); border-color: var(--accent); background: #000; }

    .nav-btn { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(0,0,0,0.5); color: #fff; width: 40px; height: 60px; display: flex; align-items: center; justify-content: center; font-size: 24px; cursor: pointer; border-radius: 8px; user-select: none; transition: 0.2s; pointer-events: auto; }
    .nav-btn:hover { background: var(--accent); }
    .prev-btn { left: 10px; }
    .next-btn { right: 10px; }

    .hidden-ui .ui-layer, .hidden-ui .bottom-bar { display: none !important; }
  </style>
</head>
<body class="layout-horizontal">

<div class="instance" id="inst1">
    <div class="ui-layer">
        <div class="top-bar"><div class="category-container cat-wrapper"></div></div>
        <div class="focus-toggle" title="Solo Hotkey Mode">🎯</div>
        <div class="nav-btn prev-btn">&lt;</div>
        <div class="nav-btn next-btn">&gt;</div>
    </div>
    <div class="viewport">
        <img class="mainImage" draggable="false" />
        <div class="loader">SNIPING...</div>
    </div>
</div>

<div id="divider"></div>

<div class="instance hidden" id="inst2">
    <div class="ui-layer">
        <div class="top-bar"><div class="category-container cat-wrapper"></div></div>
        <div class="focus-toggle" title="Solo Hotkey Mode">🎯</div>
        <div class="nav-btn prev-btn">&lt;</div>
        <div class="nav-btn next-btn">&gt;</div>
    </div>
    <div class="viewport">
        <img class="mainImage" draggable="false" />
        <div class="loader">SNIPING...</div>
    </div>
</div>

<div class="bottom-bar">
    <button id="toggleDual" class="tool-btn">👥</button>
    <div id="splitControls">
      <input type="range" id="splitSlider" min="10" max="90" value="50" title="Adjust split ratio">
      <button id="toggleLayout" class="tool-btn" title="Toggle horizontal/vertical split">↕</button>
    </div>
    <button id="resetAll" class="tool-btn">↻</button>
    <button id="uiBtn" class="tool-btn">👁</button>
</div>

<script>
  const baseURL = 'https://f003.backblazeb2.com/file/linksref2/';
  const categories = [
    {v:"People",l:"P"},{v:"pplus",l:"p"},{v:"Anime",l:"A"},{v:"angle",l:"a"},{v:"Figure",l:"F"},{v:"Style",l:"S"},
    {v:"XMaleAnatomy",l:"X"},{v:"Emotions",l:"E"},{v:"Background",l:"B"},{v:"Walk",l:"W"},{v:"screencap",l:"s"},{v:"Manga",l:"M"},
    {v:"moeManga",l:"m"},{v:"TestPanel",l:"T"}
  ];

  let soloInstance = null;

  class RefInstance {
    constructor(containerId, defaultCatIndex) {
      this.container = document.getElementById(containerId);
      this.img = this.container.querySelector('.mainImage');
      this.catWrapper = this.container.querySelector('.cat-wrapper');
      this.loader = this.container.querySelector('.loader');
      this.focusBtn = this.container.querySelector('.focus-toggle');
      this.prevBtn = this.container.querySelector('.prev-btn');
      this.nextBtn = this.container.querySelector('.next-btn');
      this.id = containerId;
      
      this.state = {
        history: [], index: -1, prefetched: null,
        transform: { x:0, y:0, scale:1, flipped:false },
        isDragging: false, dragStart: { x:0, y:0 }, minSize: 350
      };

      this.touchStartX = 0;
      this.touchEndX = 0;

      this.init(defaultCatIndex);
    }

    init(defaultCatIndex) {
      categories.forEach((cat, idx) => {
        const label = document.createElement('label');
        label.className = 'cat-btn';
        label.innerHTML = `<input type="checkbox" value="${cat.v}" ${idx === defaultCatIndex ? 'checked' : ''}>${cat.l}`;
        this.catWrapper.appendChild(label);
      });

      this.focusBtn.onclick = () => {
        if (soloInstance === this) {
          soloInstance = null;
        } else {
          soloInstance = this;
        }
        updateFocusUI();
      };

      this.prevBtn.onclick = () => this.navigateBack();
      this.nextBtn.onclick = () => this.navigateForward();

      this.container.addEventListener('touchstart', e => {
        this.touchStartX = e.changedTouches[0].screenX;
      }, {passive: true});

      this.container.addEventListener('touchend', e => {
        this.touchEndX = e.changedTouches[0].screenX;
        this.handleSwipe();
      }, {passive: true});

      this.bindMouse();
      this.catWrapper.onchange = () => {
        this.state.history = []; this.state.index = -1;
        this.navigateForward();
      };
    }

    handleSwipe() {
      const swipeThreshold = 50;
      if (this.touchEndX < this.touchStartX - swipeThreshold) this.navigateForward();
      if (this.touchEndX > this.touchStartX + swipeThreshold) this.navigateBack();
    }

    async getFileSize(cat) {
      try {
        const resp = await fetch(baseURL + cat + '.txt', { method: 'HEAD' });
        return parseInt(resp.headers.get('content-length')) || 100000;
      } catch(e) { return 100000; }
    }

    async sniperFetch(retry = 0) {
      if (retry > 5) return null;
      const active = [...this.catWrapper.querySelectorAll('input:checked')].map(i => i.value);
      if (!active.length) return null;
      const cat = active[Math.floor(Math.random() * active.length)];
      const totalSize = await this.getFileSize(cat);
      const randomPos = Math.floor(Math.random() * (totalSize - 3000));
      try {
        const resp = await fetch(baseURL + cat + '.txt', { headers: { 'Range': `bytes=${randomPos}-${randomPos + 2500}` } });
        const chunk = await resp.text();
        const validLines = chunk.split('\n').slice(1, -1).filter(l => l.length > 10);
        if (!validLines.length) return this.sniperFetch(retry + 1);
        const url = validLines[Math.floor(Math.random() * validLines.length)].trim();
        const isGood = await this.validateSize(url);
        return isGood ? url : this.sniperFetch(retry + 1);
      } catch (e) { return this.sniperFetch(retry + 1); }
    }

    validateSize(url) {
      return new Promise(res => {
        const i = new Image();
        i.onload = () => res(i.naturalWidth >= this.state.minSize && i.naturalHeight >= this.state.minSize);
        i.onerror = () => res(false);
        i.src = url;
      });
    }

    async navigateForward() {
      this.loader.style.display = 'block';
      if (this.state.index < this.state.history.length - 1) {
        this.state.index++; this.displayImage(this.state.history[this.state.index]); return;
      }
      let url = this.state.prefetched || await this.sniperFetch();
      this.state.prefetched = null;
      if (url) {
        this.state.history.push(url); this.state.index = this.state.history.length - 1;
        this.displayImage(url);
      }
    }

    navigateBack() {
      if (this.state.index > 0) {
        this.state.index--; this.displayImage(this.state.history[this.state.index]);
      }
    }

    displayImage(url) {
      this.img.style.opacity = '0.3';
      this.loader.style.display = 'block';
      const temp = new Image();
      temp.onload = () => {
        this.img.src = url; this.img.style.opacity = '1';
        this.loader.style.display = 'none';
        this.resetTransform(); this.prepareNext();
      };
      temp.src = url;
    }

    async prepareNext() { this.state.prefetched = await this.sniperFetch(); }
    applyTransform() {
      const {x, y, scale, flipped} = this.state.transform;
      this.img.style.transform = `translate(${x}px, ${y}px) scale(${scale * (flipped ? -1 : 1)}, ${scale})`;
    }
    resetTransform() { this.state.transform = { x:0, y:0, scale:1, flipped:false }; this.applyTransform(); }

    bindMouse() {
      const start = (x, y) => { this.state.isDragging = true; this.state.dragStart = { x: x - this.state.transform.x, y: y - this.state.transform.y }; };
      const move = (x, y) => { if (this.state.isDragging) { this.state.transform.x = x - this.state.dragStart.x; this.state.transform.y = y - this.state.dragStart.y; this.applyTransform(); } };
      this.img.onmousedown = e => start(e.clientX, e.clientY);
      this.container.onmousemove = e => move(e.clientX, e.clientY);
      window.addEventListener('mouseup', () => this.state.isDragging = false);
    }
  }

  const instances = [ new RefInstance('inst1', 0), new RefInstance('inst2', 2) ];
  instances[0].navigateForward();

  function updateFocusUI() {
    instances.forEach(i => i.focusBtn.classList.toggle('active', soloInstance === i));
  }

  // --- Split / Layout logic ---
  const inst1El = document.getElementById('inst1');
  const inst2El = document.getElementById('inst2');
  const divider = document.getElementById('divider');
  const splitSlider = document.getElementById('splitSlider');
  const toggleLayoutBtn = document.getElementById('toggleLayout');
  let isVertical = false;

  function applySplit(value) {
    const pct = value / 100;
    if (isVertical) {
      inst1El.style.flex = 'none';
      inst2El.style.flex = 'none';
      inst1El.style.width = '100%';
      inst2El.style.width = '100%';
      inst1El.style.height = `calc(${pct * 100}% - 2.5px)`;
      inst2El.style.height = `calc(${(1 - pct) * 100}% - 2.5px)`;
    } else {
      inst1El.style.flex = 'none';
      inst2El.style.flex = 'none';
      inst1El.style.height = '100%';
      inst2El.style.height = '100%';
      inst1El.style.width = `calc(${pct * 100}% - 2.5px)`;
      inst2El.style.width = `calc(${(1 - pct) * 100}% - 2.5px)`;
    }
  }

  function resetSplit() {
    splitSlider.value = 50;
    applySplit(50);
  }

  splitSlider.addEventListener('input', () => applySplit(parseInt(splitSlider.value)));

  toggleLayoutBtn.onclick = () => {
    isVertical = !isVertical;
    document.body.classList.toggle('layout-vertical', isVertical);
    document.body.classList.toggle('layout-horizontal', !isVertical);
    toggleLayoutBtn.textContent = isVertical ? '↔' : '↕';
    resetSplit();
  };

  // Divider drag
  let dividerDragging = false;
  divider.addEventListener('mousedown', e => { dividerDragging = true; divider.classList.add('dragging'); e.preventDefault(); });
  window.addEventListener('mousemove', e => {
    if (!dividerDragging) return;
    const rect = document.body.getBoundingClientRect();
    let pct;
    if (isVertical) {
      pct = Math.min(90, Math.max(10, ((e.clientY - rect.top) / rect.height) * 100));
    } else {
      pct = Math.min(90, Math.max(10, ((e.clientX - rect.left) / rect.width) * 100));
    }
    splitSlider.value = pct;
    applySplit(pct);
  });
  window.addEventListener('mouseup', () => { dividerDragging = false; divider.classList.remove('dragging'); });

  // --- Dual toggle ---
  const dualBtn = document.getElementById('toggleDual');
  let isDual = false;

  dualBtn.onclick = () => {
    isDual = !isDual;
    dualBtn.classList.toggle('active', isDual);
    document.body.classList.toggle('dual-active', isDual);
    inst2El.classList.toggle('hidden', !isDual);
    if (!isDual) {
      soloInstance = null;
      inst1El.style.cssText = '';
      inst2El.style.cssText = '';
    } else {
      resetSplit();
      if (instances[1].state.index === -1) instances[1].navigateForward();
    }
    updateFocusUI();
  };

  document.getElementById('resetAll').onclick = () => instances.forEach(i => i.resetTransform());
  document.getElementById('uiBtn').onclick = () => document.body.classList.toggle('hidden-ui');

  document.onkeydown = (e) => {
    const k = e.key.toLowerCase();
    instances.forEach((inst, idx) => {
        const isVisible = idx === 0 || isDual;
        const canControl = isVisible && (soloInstance === null || soloInstance === inst);
        
        if (canControl) {
            if (k === 'd' || k === 'arrowright') inst.navigateForward();
            if (k === 'a' || k === 'arrowleft') inst.navigateBack();
            if (k === 'w') { inst.state.transform.scale += 0.2; inst.applyTransform(); }
            if (k === 's') { inst.state.transform.scale = Math.max(0.1, inst.state.transform.scale - 0.2); inst.applyTransform(); }
            if (k === 'f') { inst.state.transform.flipped = !inst.state.transform.flipped; inst.applyTransform(); }
            if (k === 'r') inst.resetTransform();
        }
    });
    if (k === 'u') document.body.classList.toggle('hidden-ui');
  };
</script>
</body>
</html>
